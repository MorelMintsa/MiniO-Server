name: Deploy MinIO

on:
  push:
    branches: [main]
    paths:
      - docker-compose.yml
      - scripts/**
      - .env.example
      - .github/workflows/deploy-minio.yml
      - README.md
  workflow_dispatch:

jobs:
  validate:
    name: Validate compose
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet

  setup:
    name: Setup - Copy files and write .env
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
      SERVER_USER: ${{ secrets.DEPLOY_USER }}
      SERVER_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH password client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$DEPLOY_PATH"
          test -n "$SSHPASS"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          sshpass -e ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

      - name: Sync source code to server
        run: |
          tar -czf - docker-compose.yml scripts | \
            sshpass -e ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
              "tar -xzf - -C '$DEPLOY_PATH'"

      - name: Write .env on server
        env:
          DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_ENV_FILE"
          printf '%s\n' "$DEPLOY_ENV_FILE" | \
            sshpass -e ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
              "umask 077 && cat > '$DEPLOY_PATH/.env'"

  deploy-minio:
    name: Deploy - MinIO stack
    needs: setup
    runs-on: ubuntu-latest
    environment: production

    env:
      SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
      SERVER_USER: ${{ secrets.DEPLOY_USER }}
      SERVER_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}

    steps:
      - name: Install SSH password client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$DEPLOY_PATH"
          test -n "$SSHPASS"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull and start MinIO
        run: |
          sshpass -e ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -s" << 'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          test -f .env
          chmod 600 .env

          if docker compose version >/dev/null 2>&1; then
            compose=(docker compose)
          elif docker-compose version >/dev/null 2>&1; then
            compose=(docker-compose)
          else
            echo "Docker Compose is not installed on the deployment server." >&2
            echo "Install the Docker Compose v2 plugin or the docker-compose command." >&2
            exit 1
          fi

          "${compose[@]}" config --quiet
          "${compose[@]}" pull
          "${compose[@]}" up -d --remove-orphans
          "${compose[@]}" ps
          docker image prune -f
          EOF
