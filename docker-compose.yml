name: minio-server

services:
  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2025-09-07T16-13-09Z-cpuv1}
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-}
    command:
      - server
      - /data
      - --address
      - ":9000"
      - --console-address
      - ":9001"
    ports:
      - "${MINIO_API_BIND:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./minio-data/data:/data
      - ./certs:/root/.minio/certs:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - minio-private

  minio-bootstrap:
    image: minio/mc:${MINIO_MC_VERSION:-RELEASE.2025-08-13T08-35-41Z-cpuv1}
    container_name: minio-bootstrap
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKETS: ${MINIO_BUCKETS:?MINIO_BUCKETS is required}
      MINIO_ENDPOINT: https://s3-minio.gotherdev.online
      MINIO_ENABLE_VERSIONING: ${MINIO_ENABLE_VERSIONING:-false}
      MINIO_BUCKET_OBJECT_LOCK: ${MINIO_BUCKET_OBJECT_LOCK:-false}
      MINIO_BUCKET_QUOTA: ${MINIO_BUCKET_QUOTA:-}
      MINIO_APP_USER: ${MINIO_APP_USER:-}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD:-}
      MINIO_POLICY_NAME: ${MINIO_POLICY_NAME:-app-buckets-rw}
      MC_CONFIG_DIR: /tmp/.mc
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/bootstrap-minio.sh:/bootstrap-minio.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap-minio.sh"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - minio-private

networks:
  minio-private:
    driver: bridge
